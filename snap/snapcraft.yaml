name: opendtect
base: core24
version: '8.1.0'

summary: Open source seismic interpretation system

description: |
  OpendTect is a free, open source seismic interpretation system and software
  development platform. The system supports all tools needed for visualizing,
  analyzing and interpreting 2D, 3D and 4D seismic and Ground Penetrating
  Radar (GPR) data. OpendTect runs on Windows, macOS and Linux platforms.

icon: share/od.png

grade: devel
confinement: strict

platforms:
  amd64:
    build-on: amd64
    build-for: amd64

apps:
  opendtect:
    command: usr/local/bin/od_snap_launcher
    extensions: [gnome]
    common-id: com.dgbes.opendtect
    environment:
      PATH: $SNAP/usr/local/bin:$SNAP/usr/local/bin/lux64/Release:$PATH
      LD_LIBRARY_PATH: $SNAP/usr/local/qt6/lib:$LD_LIBRARY_PATH
      # Ensure Qt finds its own plugins from the snap, not the system or
      # gnome-platform (which carries Qt5, not Qt6).
      QT_PLUGIN_PATH: $SNAP/usr/local/qt6/plugins
    plugs:
      - home
      - network
      - removable-media

  od-batchhosts:
    command: usr/local/bin/lux64/Release/od_BatchHosts
    extensions: [gnome]
    plugs: [home, network, removable-media]

  od-cbvs-browse:
    command: usr/local/bin/lux64/Release/od_cbvs_browse
    extensions: [gnome]
    plugs: [home, network, removable-media]

  od-clusterproc:
